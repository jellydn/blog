name: Deploy Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Vercel auto-deploys on push to main via its git integration.
# This workflow ensures the build passes before Vercel's deployment completes.
# It does NOT deploy — Vercel handles that automatically.

concurrency:
  group: deploy-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
