name: Fetch Data

on:
  schedule:
    # Run daily at 03:00 UTC (staggered after fetch-blog-posts at 02:00)
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch GitHub repos
        run: pnpm fetch:repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch YouTube videos
        run: pnpm fetch:videos
        continue-on-error: true # Don't block repos commit if YouTube secrets aren't configured
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: 'chore: update repos and videos data'
          file_pattern: 'data/repos.json videos/'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
